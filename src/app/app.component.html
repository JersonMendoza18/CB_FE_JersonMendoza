<div style="max-width: 700px; margin: 40px auto; font-family: 'Segoe UI', Roboto, sans-serif; color: #333;">
  
  <h2 style="text-align: center; color: #002855; border-bottom: 2px solid #002855; padding-bottom: 10px;">
    Financial Agent Station (Cajero / Agente)
  </h2>

  <div *ngIf="successMessage" style="padding: 12px; background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; border-radius: 5px; margin-bottom: 15px;">
    {{ successMessage }}
  </div>
  
  <div *ngIf="errorMessage" style="padding: 12px; background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7; border-radius: 5px; margin-bottom: 15px;">
    <strong>Error:</strong> {{ errorMessage }}
  </div>

  <div style="display: flex; gap: 20px;">
    
    <div style="flex: 1; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6;">
      <h3 style="margin-top: 0; color: #002855;">Account Query</h3>
      
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Account ID:</label>
        <input type="number" [(ngModel)]="searchAccountId" placeholder="e.g. 1" style="width: 100%; padding: 8px; box-sizing: border-box;" />
      </div>
      
      <button (click)="onSearchAccount()" style="width: 100%; padding: 10px; background-color: #002855; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
        Fetch Account
      </button>

      <div *ngIf="account" style="margin-top: 20px; padding: 15px; background: white; border-radius: 6px; border: 1px solid #ced4da;">
        <h4 style="margin: 0 0 10px 0; color: #212529;">Account Details</h4>
        <p style="margin: 5px 0;"><strong>Number:</strong> {{ account.accountNumber }}</p>
        <p style="margin: 5px 0; font-size: 1.2em; color: #198754;">
          <strong>Balance:</strong> ${{ account.balance | number:'1.2-2' }}
        </p>
      </div>
    </div>

    <div style="flex: 1; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6;">
      <h3 style="margin-top: 0; color: #002855;">Execute Transaction</h3>
      
      <div *ngIf="!account" style="color: #666; font-style: italic; text-align: center; margin-top: 40px;">
        Please fetch an active account first to execute movements.
      </div>

      <div *ngIf="account">
        <div style="margin-bottom: 12px;">
          <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #666;">Active Account ID:</label>
          <input type="number" [(ngModel)]="transactionForm.accountId" [disabled]="true" style="width: 100%; padding: 8px; box-sizing: border-box; background-color: #e9ecef; cursor: not-allowed; border: 1px solid #ced4da; font-weight: bold;" />
        </div>

        <div style="margin-bottom: 12px;">
          <label style="display: block; margin-bottom: 5px; font-weight: bold;">Operation Type:</label>
          <select [(ngModel)]="transactionForm.type" style="width: 100%; padding: 8px; box-sizing: border-box;">
            <option value="DEPOSIT">DEPOSIT</option>
            <option value="WITHDRAWAL">WITHDRAWAL</option>
          </select>
        </div>

        <div style="margin-bottom: 15px;">
          <label style="display: block; margin-bottom: 5px; font-weight: bold;">Amount ($):</label>
          <input type="number" [(ngModel)]="transactionForm.amount" min="0.01" step="0.01" style="width: 100%; padding: 8px; box-sizing: border-box;" />
        </div>

        <button (click)="onSubmitTransaction()" style="width: 100%; padding: 10px; background-color: #198754; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
          Submit Movement
        </button>
      </div>
    </div>

  </div>

</div>
